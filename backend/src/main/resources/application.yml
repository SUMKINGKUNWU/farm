server:
  port: 3000

spring:
  application:
    name: farm-exchange-backend
  datasource:
    url: ${FARM_DB_URL:jdbc:postgresql://localhost:5432/farm_exchange}
    username: ${FARM_DB_USERNAME:postgres}
    password: ${FARM_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai

logging:
  level:
    org.flywaydb: info
