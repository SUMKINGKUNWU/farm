      <text x="24" y="65" font-size="30" fill="#2e1c09" font-weight="900">3 可收获</text>
      <rect x="202" y="21" width="66" height="48" rx="20" fill="#ffffff" opacity="0.46"/>
      <text x="220" y="52" font-size="18" fill="#4a391d" font-weight="900">8/16</text>
