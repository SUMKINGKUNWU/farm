<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4e8"/>
      <stop offset="0.45" stop-color="#f7ecd7"/>
      <stop offset="1" stop-color="#d8e8d1"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f0de"/>
      <stop offset="1" stop-color="#dbeacb"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d3a65d"/>
      <stop offset="1" stop-color="#8b5a32"/>
    </linearGradient>
    <linearGradient id="pasture" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b8dc83"/>
      <stop offset="1" stop-color="#58944c"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6a3"/>
      <stop offset="1" stop-color="#d58b23"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#eef9e6" stop-opacity="0.30"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#526044" flood-opacity="0.22"/>
    </filter>
    <filter id="float" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#29351f" flood-opacity="0.18"/>
    </filter>
    <filter id="inner" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-1" stdDeviation="1.4" flood-color="#ffffff" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#7b6d53" flood-opacity="0.16"/>
    </filter>
    <pattern id="furrow" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="5" height="16" fill="#ffffff" opacity="0.12"/>
    </pattern>
    <pattern id="meadow" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M3 15 C5 10 7 10 9 15 M10 15 C12 8 14 9 15 15" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.6"/>
    </pattern>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .title { font-size: 32px; font-weight: 900; fill: #26321f; letter-spacing: .06em; }
      .note { font-size: 15px; fill: #6d765f; }
      .label { font-size: 13px; fill: #79806f; font-weight: 700; }
      .value { font-size: 24px; fill: #182113; font-weight: 900; }
      .small { font-size: 12px; fill: #7b856f; font-weight: 700; }
      .nav { font-size: 11px; fill: #607057; font-weight: 900; }
      .card-title { font-size: 16px; fill: #1d2818; font-weight: 900; }
      .dark-title { font-size: 16px; fill: #fff7df; font-weight: 900; }
      .dark-small { font-size: 12px; fill: #e8dfc8; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="90" fill="#ffffff" opacity="0.34"/>
  <circle cx="1296" cy="156" r="120" fill="#cfe6b3" opacity="0.46"/>
  <circle cx="1200" cy="812" r="170" fill="#efd39c" opacity="0.36"/>
  <path d="M0 736 C190 672 258 766 438 706 C650 636 778 688 936 612 C1126 520 1250 602 1440 536 L1440 960 L0 960 Z" fill="#6f9b5f" opacity="0.13"/>

  <text x="86" y="76" class="title">紧凑玻璃拟态方案</text>
  <text x="86" y="108" class="note">主界面缩小为手机游戏 HUD，玻璃拟态只用于个人信息、物品详情、交易确认等悬浮层。</text>

