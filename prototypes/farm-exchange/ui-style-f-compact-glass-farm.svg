    <text x="24" y="27" font-size="14" fill="#506146" font-weight="800">比例调整：主屏内容从大面板改为小型 HUD；地块紧凑排列；玻璃拟态作为悬浮信息卡和确认弹窗，避免影响主界面可读性。</text>
