      <text x="81" y="92" text-anchor="middle" font-size="44">🌾</text>
      <rect x="154" y="30" width="102" height="102" rx="26" fill="#ffffff" fill-opacity="0.58"/>
      <text x="205" y="92" text-anchor="middle" font-size="44">🌱</text>
      <rect x="278" y="30" width="102" height="102" rx="26" fill="#ffffff" fill-opacity="0.58"/>
      <text x="329" y="92" text-anchor="middle" font-size="44">🐔</text>
      <rect x="402" y="30" width="102" height="102" rx="26" fill="#ffffff" fill-opacity="0.58"/>
      <text x="453" y="92" text-anchor="middle" font-size="44">🐄</text>
