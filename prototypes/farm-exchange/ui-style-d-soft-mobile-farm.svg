    <rect x="2" y="2" width="1112" height="796" rx="76" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
    <circle cx="278" cy="124" r="66" fill="#e5eadf"/>
    <text x="278" y="145" text-anchor="middle" font-size="56">👩‍🌾</text>
    <circle cx="890" cy="120" r="58" fill="#ffffff" filter="url(#innerGlow)"/>
