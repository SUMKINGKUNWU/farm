<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f4f2"/>
      <stop offset="1" stop-color="#dededb"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f7faf2"/>
      <stop offset="1" stop-color="#e9eee1"/>
    </linearGradient>
    <linearGradient id="farmGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff5c8"/>
      <stop offset="0.46" stop-color="#d7f0cf"/>
      <stop offset="1" stop-color="#f1d49b"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#757575" flood-opacity="0.28"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#9a9a9a" flood-opacity="0.18"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.5" fill="#d9d9d9" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1440" height="960" fill="url(#page)"/>
  <g transform="translate(162 82)">
