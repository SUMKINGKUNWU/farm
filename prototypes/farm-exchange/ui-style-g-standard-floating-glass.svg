<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edf6e8"/>
      <stop offset="0.55" stop-color="#f7ecd1"/>
      <stop offset="1" stop-color="#cfe4bd"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e5"/>
      <stop offset="1" stop-color="#e7eecf"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcb067"/>
      <stop offset="1" stop-color="#8b5d35"/>
    </linearGradient>
    <linearGradient id="pasture" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bce28b"/>
      <stop offset="1" stop-color="#5b9a50"/>
    </linearGradient>
    <linearGradient id="market" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0b6"/>
      <stop offset="1" stop-color="#d99432"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#f2f8e8" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#405131" flood-opacity="0.22"/>
    </filter>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#324023" flood-opacity="0.18"/>
    </filter>
    <filter id="inner" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="-1" stdDeviation="1.2" flood-color="#ffffff" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#80694b" flood-opacity="0.15"/>
    </filter>
    <pattern id="soilRows" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="6" height="20" fill="#ffffff" opacity="0.13"/>
    </pattern>
    <pattern id="grass" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M4 18 C7 10 10 10 12 18 M12 18 C15 8 18 10 19 18" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.7"/>
    </pattern>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; }
      .h1 { font-size: 34px; font-weight: 900; fill: #23311d; letter-spacing: .04em; }
      .h2 { font-size: 22px; font-weight: 900; fill: #25321f; }
      .label { font-size: 13px; font-weight: 800; fill: #7a806f; }
      .small { font-size: 12px; font-weight: 700; fill: #78826e; }
      .value { font-size: 26px; font-weight: 900; fill: #1c2716; }
      .white-title { font-size: 21px; font-weight: 900; fill: #fff8df; }
      .white-small { font-size: 12px; font-weight: 700; fill: #f2e9d2; }
      .nav { font-size: 15px; font-weight: 900; fill: #536949; }
      .glass-title { font-size: 18px; font-weight: 900; fill: #1d2817; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#sky)"/>
  <circle cx="126" cy="126" r="104" fill="#fff8df" opacity="0.42"/>
  <circle cx="1280" cy="150" r="148" fill="#c6dfad" opacity="0.5"/>
  <path d="M0 730 C172 648 268 742 438 666 C626 582 774 650 922 574 C1108 478 1244 554 1440 486 L1440 960 L0 960 Z" fill="#628e55" opacity="0.16"/>
  <path d="M0 818 C190 736 322 816 530 734 C728 656 864 724 1050 650 C1198 590 1306 626 1440 584 L1440 960 L0 960 Z" fill="#476f3f" opacity="0.11"/>

  <g transform="translate(72 58)">
    <rect width="1296" height="844" rx="54" fill="url(#shell)" filter="url(#shadow)"/>
    <rect x="3" y="3" width="1290" height="838" rx="51" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.75"/>

    <g transform="translate(42 34)">
      <circle cx="34" cy="34" r="34" fill="#dce8ca" filter="url(#inner)"/>
      <path d="M19 40 C26 18 43 18 50 40 C42 35 28 35 19 40 Z" fill="#5f9050"/>
      <text x="88" y="28" class="h1">丰穗农场</text>
      <text x="90" y="54" class="label">资金 10,000 · 可收获 3 · 栏位 8/16</text>

      <g transform="translate(886 0)">
        <rect width="104" height="48" rx="24" fill="#ffffff" filter="url(#inner)"/>
        <text x="25" y="31" class="nav">背包</text>
        <rect x="118" width="104" height="48" rx="24" fill="#ffffff" filter="url(#inner)"/>
        <text x="143" y="31" class="nav">任务</text>
        <rect x="236" width="104" height="48" rx="24" fill="#23341d"/>
        <text x="261" y="31" font-size="15" fill="#fff8df" font-weight="900">设置</text>
      </g>
    </g>

    <g transform="translate(44 126)">
      <rect width="820" height="560" rx="42" fill="#f8efd9" filter="url(#inner)"/>
      <text x="34" y="44" class="h2">农田与牧场</text>
      <text x="694" y="44" class="label">点击地块查看物品悬浮卡</text>

      <g transform="translate(34 72)">
        <text x="0" y="0" class="label">农田栏位</text>
        <g transform="translate(0 18)">
          <rect width="124" height="92" rx="22" fill="url(#field)"/>
          <rect width="124" height="92" rx="22" fill="url(#soilRows)"/>
          <text x="42" y="56" font-size="28" fill="#fff8df" font-weight="900">小麦</text>
          <rect x="140" width="124" height="92" rx="22" fill="url(#field)"/>
          <rect x="140" width="124" height="92" rx="22" fill="url(#soilRows)"/>
          <text x="182" y="56" font-size="28" fill="#fff8df" font-weight="900">玉米</text>
          <rect x="280" width="124" height="92" rx="22" fill="url(#field)"/>
          <rect x="280" width="124" height="92" rx="22" fill="url(#soilRows)"/>
          <text x="324" y="56" font-size="26" fill="#fff8df" font-weight="900">成熟</text>
          <rect x="420" width="124" height="92" rx="22" fill="#fff9e8" stroke="#d5b36d" stroke-width="2" stroke-dasharray="8 8"/>
          <text x="466" y="56" font-size="32" fill="#9d7a34" font-weight="900">+</text>
          <rect x="560" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="604" y="56" font-size="26" fill="#716b57" font-weight="900">扩建</text>
        </g>
        <g transform="translate(0 130)">
          <rect width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="47" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
          <rect x="140" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="187" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
          <rect x="280" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="327" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
          <rect x="420" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="467" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
          <rect x="560" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="607" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
        </g>
      </g>

      <g transform="translate(34 340)">
        <text x="0" y="0" class="label">牧场栏位</text>
        <g transform="translate(0 18)">
          <rect width="124" height="92" rx="22" fill="url(#pasture)"/>
          <rect width="124" height="92" rx="22" fill="url(#grass)"/>
          <text x="42" y="56" font-size="28" fill="#fff8df" font-weight="900">鸡舍</text>
          <rect x="140" width="124" height="92" rx="22" fill="url(#pasture)"/>
          <rect x="140" width="124" height="92" rx="22" fill="url(#grass)"/>
          <text x="182" y="56" font-size="28" fill="#fff8df" font-weight="900">牛栏</text>
          <rect x="280" width="124" height="92" rx="22" fill="#f3f8e7" stroke="#83b265" stroke-width="2" stroke-dasharray="8 8"/>
          <text x="326" y="56" font-size="32" fill="#5d9749" font-weight="900">+</text>
          <rect x="420" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="467" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
          <rect x="560" width="124" height="92" rx="22" fill="#ddd8c4"/>
          <text x="607" y="56" font-size="24" fill="#716b57" font-weight="900">锁</text>
        </g>
      </g>

      <g transform="translate(534 192)">
        <rect width="238" height="178" rx="32" fill="url(#glass)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.86" filter="url(#lift)"/>
        <text x="24" y="38" class="glass-title">小麦地块</text>
        <text x="24" y="66" class="small">点击物品后悬浮展示</text>
        <line x1="24" y1="84" x2="214" y2="84" stroke="#ffffff" stroke-opacity="0.72"/>
        <text x="24" y="116" class="label">状态</text>
        <text x="150" y="116" font-size="15" fill="#1c2716" font-weight="900">可收获</text>
        <text x="24" y="146" class="label">预计产出</text>
        <text x="150" y="146" font-size="15" fill="#1c2716" font-weight="900">12 份</text>
      </g>
    </g>

    <g transform="translate(902 126)">
      <rect width="350" height="256" rx="38" fill="#24341e" filter="url(#inner)"/>
      <text x="28" y="45" class="white-title">交易站</text>
      <text x="28" y="72" class="white-small">价格随最近成交量浮动</text>
      <path d="M28 178 C76 140 102 166 144 116 C192 60 220 106 258 78 C300 48 318 76 326 68" fill="none" stroke="#f5ce71" stroke-width="6" stroke-linecap="round"/>
      <path d="M28 192 C76 154 102 180 144 130 C192 74 220 120 258 92 C300 62 318 90 326 82" fill="none" stroke="#f5ce71" stroke-width="22" stroke-opacity="0.08" stroke-linecap="round"/>
      <rect x="28" y="204" width="88" height="34" rx="17" fill="#f5ce71"/>
      <text x="50" y="226" font-size="13" fill="#3d2a10" font-weight="900">买入</text>
      <rect x="132" y="204" width="88" height="34" rx="17" fill="#fff8df" opacity="0.14"/>
      <text x="154" y="226" font-size="13" fill="#fff8df" font-weight="900">卖出</text>
      <rect x="236" y="204" width="88" height="34" rx="17" fill="#fff8df" opacity="0.14"/>
      <text x="254" y="226" font-size="13" fill="#fff8df" font-weight="900">私下</text>

      <g transform="translate(0 284)">
        <rect width="350" height="202" rx="38" fill="#fff7e5" filter="url(#inner)"/>
        <text x="28" y="44" class="h2">物品行情</text>
        <rect x="28" y="70" width="294" height="44" rx="18" fill="#eef5df"/>
        <text x="48" y="98" class="label">小麦</text>
        <text x="250" y="98" font-size="15" fill="#4c8b40" font-weight="900">24.5</text>
        <rect x="28" y="124" width="294" height="44" rx="18" fill="#fffdf4"/>
        <text x="48" y="152" class="label">鸡蛋</text>
        <text x="250" y="152" font-size="15" fill="#a06a23" font-weight="900">18.2</text>
      </g>
    </g>

    <g transform="translate(930 430)">
      <rect width="298" height="226" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.86" filter="url(#lift)"/>
      <text x="26" y="42" class="glass-title">交易确认</text>
      <text x="26" y="70" class="small">悬浮层，不占用主界面比例</text>
      <line x1="26" y1="90" x2="272" y2="90" stroke="#ffffff" stroke-opacity="0.72"/>
      <text x="26" y="124" class="label">交易站税费</text>
      <text x="210" y="124" font-size="15" fill="#1c2716" font-weight="900">3%</text>
      <text x="26" y="154" class="label">私下交易税费</text>
      <text x="210" y="154" font-size="15" fill="#1c2716" font-weight="900">5%</text>
      <text x="26" y="184" class="label">交易密码</text>
      <text x="178" y="184" font-size="15" fill="#1c2716" font-weight="900">双方确认</text>
    </g>

    <g transform="translate(64 722)">
      <rect width="720" height="76" rx="38" fill="#ffffff" filter="url(#inner)"/>
      <text x="48" y="48" class="nav">农场</text>
      <text x="174" y="48" class="nav" opacity="0.58">商店</text>
      <circle cx="360" cy="38" r="44" fill="#23341d" filter="url(#lift)"/>
      <text x="346" y="52" font-size="42" fill="#fff8df">+</text>
      <text x="500" y="48" class="nav" opacity="0.58">交易站</text>
      <text x="620" y="48" class="nav" opacity="0.58">私下</text>
    </g>

    <g transform="translate(838 708)">
      <rect width="344" height="90" rx="30" fill="url(#glass)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.84" filter="url(#lift)"/>
      <circle cx="44" cy="45" r="24" fill="#dce8ca"/>
      <path d="M31 51 C36 34 51 34 57 51 C49 47 38 47 31 51 Z" fill="#5f9050"/>
      <text x="82" y="38" class="glass-title">个人信息悬浮卡</text>
      <text x="82" y="62" class="small">头像点击后展开：资金、令牌、交易密码状态</text>
    </g>
  </g>

  <text x="86" y="928" font-size="15" fill="#526246" font-weight="800">修正点：主界面不再使用紧凑手机比例；玻璃拟态只用于人物、用户、物品、交易确认等悬浮信息展示。</text>
</svg>
